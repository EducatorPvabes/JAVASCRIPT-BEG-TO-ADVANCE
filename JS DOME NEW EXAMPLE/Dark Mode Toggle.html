<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dark Mode Toggle</title>
    <style>
        body {
            font-family: Arial;
            transition: 0.3s;
            background-color: white;
            color: black;
        }

        /* 🌙 Dark Mode Class */
        .dark-mode {
            background-color: #121212;
            color: white;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>Dark Mode Toggle</h2>

    <button id="toggleBtn">Toggle Dark Mode</button>

    <script>
        const btn = document.getElementById("toggleBtn");

        btn.addEventListener("click", function() {
            // 🔥 Toggle class instead of overwriting styles
            document.body.classList.toggle("dark-mode");
        });
    </script>

</body>
</html>
